{% extends "todos_v1/base.html" %}

{% block title %}Todo List{% endblock %}

{% block content %}
    <div class="flex items-center justify-between mb-8">
        <h1 class="text-3xl font-bold text-gray-800">My Todos</h1>
        <a href="{% url 'todo_create_view' %}" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-4 py-2 rounded-lg transition">+ New Todo</a>
    </div>

    <ul class="space-y-3">
        {% for todo in todos %}
            <li class="bg-white rounded-xl shadow-sm px-5 py-4 flex items-center justify-between gap-4">
                <div class="flex items-center gap-3">
                    <form method="post" action="{% url 'todo_toggle_view' todo.id %}">
                        {% csrf_token %}
                        <button type="submit" class="w-5 h-5 rounded-full border-2 flex-shrink-0 {% if todo.completed %}bg-green-500 border-green-500{% else %}border-gray-300{% endif %}"></button>
                    </form>
                    <span class="text-gray-800 font-medium {% if todo.completed %}line-through text-gray-400{% endif %}">
                        {{ todo.title }}
                    </span>
                </div>
                <div class="flex items-center gap-2">
                    <a href="{% url 'todo_update_view' todo.id %}" class="text-xs font-semibold text-indigo-600 bg-indigo-50 hover:bg-indigo-100 px-3 py-1 rounded-full transition">Edit</a>
                    <form method="post" action="{% url 'todo_delete_view' todo.id %}">
                        {% csrf_token %}
                        <button type="submit" class="text-xs font-semibold text-red-600 bg-red-50 hover:bg-red-100 px-3 py-1 rounded-full transition">Delete</button>
                    </form>
                </div>
            </li>
        {% empty %}
            <li class="text-gray-400 text-center py-16">No todos yet. <a href="{% url 'todo_create_view' %}" class="text-indigo-500 underline">Create one</a>.</li>
        {% endfor %}
    </ul>
{% endblock %}
